<style>
  .log-back { margin-bottom: 0.75em; }

  .log-filter-form { margin-bottom: 1em; }
  .log-filter-form label { margin-left: 1em; }
  .log-filter-form label:first-child { margin-left: 0; }
  .log-filter-form input[type="text"] { width: 280px; }
  .log-filter-form input[type="submit"] { margin-left: 1em; }
  .log-filter-form .log-filter-clear { margin-left: 0.5em; }

  .log-pagination { margin-top: 1em; }
  .log-pagination a + a { margin-left: 1em; }

  .log-level-default { color: #888; white-space: nowrap; }
  {% for level, color in level_colors.items %}.log-level-{{ level|lower }} { color: {{ color }}; white-space: nowrap;{% if level == "ERROR" or level == "WARNING" or level == "CRITICAL" %} font-weight: bold;{% endif %} }
  {% endfor %}

  .log-col-timestamp  { white-space: nowrap; }
  .log-col-module     { white-space: nowrap; font-size: 0.85em; }
  .log-col-message    { word-break: break-word; }

  @media (prefers-color-scheme: dark) {
    .log-filter-form input[type="text"] { background: #1a1a1a; color: #ccc; border-color: #3a3a3a; }
  }
  [data-theme="dark"] .log-filter-form input[type="text"] { background: #1a1a1a; color: #ccc; border-color: #3a3a3a; }
</style>
