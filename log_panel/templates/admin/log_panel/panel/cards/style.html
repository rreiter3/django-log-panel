<style>
  .range-btn {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.8em;
    font-weight: bold;
    text-decoration: none;
    background: #e8e8e8;
    color: #333;
  }
  .range-btn--active {
    background: #417690;
    color: #fff !important;
  }

  .status-row {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 1em 1.25em;
    margin-bottom: 0.75em;
    background: #fff;
  }
  .status-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1em;
    margin-bottom: 0.6em;
  }
  .status-logger-name {
    font-weight: bold;
    font-size: 0.95em;
    color: #417690;
    text-decoration: none;
  }
  .status-logger-name:hover { text-decoration: underline; }
  .status-badges { display: flex; gap: 0.4em; flex-wrap: wrap; align-items: center; }
  .badge {
    border-radius: 3px;
    padding: 1px 7px;
    font-size: 0.72em;
    font-weight: bold;
    white-space: nowrap;
  }
  .badge-error   { background: {{ level_colors.ERROR }}; color: #fff; }
  .badge-warning { background: {{ level_colors.WARNING }}; color: #fff; }
  .badge-section { font-size: 0.68em; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

  .timeline {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .timeline-slot {
    flex: 1;
    height: 28px;
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    user-select: none;
    display: block;
    text-decoration: none;
  }
  .timeline-slot:hover .timeline-tooltip { display: block; }
  .timeline-slot.ok      { background: #44b78b; }
  .timeline-slot.warning { background: {{ level_colors.WARNING }}; }
  .timeline-slot.error   { background: {{ level_colors.CRITICAL }}; }
  .timeline-slot.empty   { background: #e8e8e8; }
  .timeline-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 5px);
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    font-size: 0.7em;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }
  .timeline-footer {
    display: flex;
    justify-content: space-between;
    font-size: 0.7em;
    color: #aaa;
    margin-top: 3px;
  }

  .status-healthy { font-size: 0.75em; color: #44b78b; font-weight: bold; }

  @media (prefers-color-scheme: dark) {
    .status-healthy { color: #2d7a5f; }

    .status-row          { border-color: #3a3a3a; background: #1a1a1a; }
    .status-logger-name  { color: #6bafc6; }
    .range-btn           { background: #2a2a2a; color: #ccc; }
    .badge-section       { color: #666; }
    .timeline-slot.ok    { background: #2d7a5f; }
    .timeline-slot.empty { background: #2a2a2a; }
    .timeline-footer     { color: #666; }
  }
  [data-theme="dark"] .status-row          { border-color: #3a3a3a; background: #1a1a1a; }
  [data-theme="dark"] .status-logger-name  { color: #6bafc6; }
  [data-theme="dark"] .range-btn           { background: #2a2a2a; color: #ccc; }
  [data-theme="dark"] .badge-section       { color: #666; }
  [data-theme="dark"] .timeline-slot.ok    { background: #2d7a5f; }
  [data-theme="dark"] .timeline-slot.empty { background: #2a2a2a; }
  [data-theme="dark"] .timeline-footer     { color: #666; }
  [data-theme="dark"] .status-healthy      { color: #2d7a5f; }
</style>
