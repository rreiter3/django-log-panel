{% load i18n %}

<div class="toolbar">
  <div class="toolbar-left">
    <span class="range-label">{{ range_label }}</span>
    <div class="range-buttons">
      {% for r in ranges %}
        <a href="?range={{ r }}{% if selected_filter %}&filter={{ selected_filter }}{% endif %}"
           class="range-btn {% if selected_range == r %}range-btn--active{% endif %}">
          {{ r }}
        </a>
      {% endfor %}
    </div>
  </div>

  {% include "admin/log_panel/panel/cards/filter.html" %}
</div>
