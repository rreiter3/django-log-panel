name: Release

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: Package index to publish to.
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases must be created from main. Selected branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish_testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.publish_target == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/django-log-panel/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    if: ${{ inputs.publish_target == 'pypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/django-log-panel/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
