name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version-bump:
    name: Check version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify package version increased
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "${BASE_SHA}:pyproject.toml" > /tmp/base-pyproject.toml
          python3 .github/scripts/check_version_bump.py /tmp/base-pyproject.toml pyproject.toml
